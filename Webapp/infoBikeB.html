<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Challenge UI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-container">
        <div class="home-icon"></div>
        <div class="header">
            <div class="badge">BIKE B</div>
            <h1>Du bist <span>Bike B</span></h1>
            <p>Bereit für den 90-Sekunden-Sprint?</p>
        </div>
        <div class="info-card">
            <div class="info-row">
                <div class="label"><span class="icon lightning">⚡</span> Dauer</div>
                <div class="value">90 Sekunden</div>
            </div>
            <div class="info-row">
                <div class="label"><span class="icon group">👥</span> Modus</div>
                <div class="value">1 vs 1 Duell</div>
            </div>
            <div class="info-row">
                <div class="label"><span class="icon pulse">📈</span> Tracking</div>
                <div class="value">Speed • Distanz • Rang</div>
            </div>
        </div>
        <div class="button-group">
            <button class="btn-primary">Challenge beitreten →</button>
            <button class="btn-secondary">🏆 Rangliste</button>
        </div>
    </div>
</body>
</html>
