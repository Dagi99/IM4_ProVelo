<!-- admin.html — Geschützte Admin-Übersicht: Highscores anzeigen/löschen, Logout. -->
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Challenge – Admin</title>

    <link rel="stylesheet" href="css/race.css">
    <link rel="stylesheet" href="css/leaderboard.css">
    <style>
        .admin-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }

        .admin-card__right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: var(--space-sm);
            flex-shrink: 0;
        }

        .admin-delete-btn {
            width: auto;
            padding: 8px 14px;
            font-size: var(--font-size-sm);
            border-radius: var(--radius-md);
        }

        .admin-meta {
            font-size: var(--font-size-xs, 0.75rem);
            color: var(--color-text-muted);
        }

        .admin-logout {
            width: auto;
            padding: 10px 16px;
            font-size: var(--font-size-md);
        }
    </style>
</head>
<body class="leaderboard-page">
    <div class="page">

        <div class="leaderboard-header">
            <a href="leaderboard.html" class="back-button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                Rangliste
            </a>

            <button type="button" id="logoutBtn" class="btn btn-danger-outline admin-logout">
                Logout
            </button>
        </div>

        <section class="leaderboard-section">
            <h1 class="leaderboard-title">Admin – Highscores</h1>

            <div class="leaderboard-tabs">
                <button type="button" class="leaderboard-tab leaderboard-tab--active" data-period="today">
                    Heute
                </button>

                <button type="button" class="leaderboard-tab" data-period="alltime">
                    Allzeit
                </button>
            </div>

            <div class="leaderboard-list admin-list" aria-live="polite">
                <p class="leaderboard-empty">Laden…</p>
            </div>
        </section>

    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/logout.js"></script>
</body>
</html>
