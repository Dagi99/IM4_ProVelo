<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Challenge – Rangliste</title>

    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/leaderboard.css">
</head>
<body class="leaderboard-page">
    <div class="page">

        <div class="leaderboard-header">
            <a href="../index.html" class="back-button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                Zurück
            </a>

            <a href="../index.html" class="home-button" aria-label="Home">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 10.5 12 3l9 7.5"/>
                    <path d="M5 9.5V21h14V9.5"/>
                </svg>
            </a>
        </div>

        <section class="leaderboard-section">
            <h1 class="leaderboard-title">Rangliste</h1>

            <div class="leaderboard-tabs">
                <button class="leaderboard-tab leaderboard-tab--active">
                    Heute
                </button>

                <button class="leaderboard-tab">
                    Allzeit
                </button>
            </div>

            <div class="leaderboard-list">

                <div class="leaderboard-card">
                    <div class="leaderboard-card__left">
                        <div class="leaderboard-card__icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="8" r="3"/>
                                <path d="M8 21h8"/>
                                <path d="M12 11v10"/>
                                <path d="M7 4H5a2 2 0 0 0-2 2v2"/>
                                <path d="M17 4h2a2 2 0 0 1 2 2v2"/>
                                <path d="M7 20H5a2 2 0 0 1-2-2v-2"/>
                                <path d="M17 20h2a2 2 0 0 0 2-2v-2"/>
                            </svg>
                        </div>

                        <div class="leaderboard-card__info">
                            <div class="leaderboard-card__name">Lina</div>
                            <div class="leaderboard-card__bike">Bike A</div>
                        </div>
                    </div>

                    <div class="leaderboard-card__distance">
                        1.42 km
                    </div>
                </div>

                <div class="leaderboard-card">
                    <div class="leaderboard-card__left">
                        <div class="leaderboard-card__icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="8" r="3"/>
                                <path d="M8 21h8"/>
                                <path d="M12 11v10"/>
                                <path d="M7 4H5a2 2 0 0 0-2 2v2"/>
                                <path d="M17 4h2a2 2 0 0 1 2 2v2"/>
                                <path d="M7 20H5a2 2 0 0 1-2-2v-2"/>
                                <path d="M17 20h2a2 2 0 0 0 2-2v-2"/>
                            </svg>
                        </div>

                        <div class="leaderboard-card__info">
                            <div class="leaderboard-card__name">Max</div>
                            <div class="leaderboard-card__bike">Bike B</div>
                        </div>
                    </div>

                    <div class="leaderboard-card__distance">
                        1.35 km
                    </div>
                </div>

                <div class="leaderboard-card">
                    <div class="leaderboard-card__left">
                        <div class="leaderboard-card__icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="8" r="3"/>
                                <path d="M8 21h8"/>
                                <path d="M12 11v10"/>
                                <path d="M7 4H5a2 2 0 0 0-2 2v2"/>
                                <path d="M17 4h2a2 2 0 0 1 2 2v2"/>
                                <path d="M7 20H5a2 2 0 0 1-2-2v-2"/>
                                <path d="M17 20h2a2 2 0 0 0 2-2v-2"/>
                            </svg>
                        </div>

                        <div class="leaderboard-card__info">
                            <div class="leaderboard-card__name">Jules</div>
                            <div class="leaderboard-card__bike">Bike A</div>
                        </div>
                    </div>

                    <div class="leaderboard-card__distance">
                        1.21 km
                    </div>
                </div>

            </div>
        </section>

    </div>

    <script src="../js/leaderboard.js"></script>
</body>
</html>
