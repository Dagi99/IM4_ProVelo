<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Challenge – Rangliste</title>

    <link rel="stylesheet" href="css/race.css">
    <link rel="stylesheet" href="css/leaderboard.css">
</head>
<body class="leaderboard-page">
    <div class="page">

        <div class="leaderboard-header">
            <a href="index.html" class="back-button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                Zurück
            </a>

            <a href="index.html" class="home-button" aria-label="Home">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 10.5 12 3l9 7.5"/>
                    <path d="M5 9.5V21h14V9.5"/>
                </svg>
            </a>
        </div>

        <section class="leaderboard-section">
            <h1 class="leaderboard-title">Rangliste</h1>

            <div class="leaderboard-tabs">
                <button type="button" class="leaderboard-tab leaderboard-tab--active" data-period="today">
                    Heute
                </button>

                <button type="button" class="leaderboard-tab" data-period="alltime">
                    Allzeit
                </button>
            </div>

            <div class="leaderboard-list" aria-live="polite">
                <p class="leaderboard-empty">Laden…</p>
            </div>
        </section>

    </div>

    <script src="js/leaderboard.js"></script>
</body>
</html>
