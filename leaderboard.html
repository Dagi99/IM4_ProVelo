<!-- leaderboard.html — Öffentliche Rangliste mit Tabs Heute/Allzeit. -->
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Challenge – Rangliste</title>

    <link rel="stylesheet" href="css/race.css">
    <link rel="stylesheet" href="css/leaderboard.css">
</head>
<body class="leaderboard-page">
    <div class="page">

        <div class="leaderboard-header">
            <a href="index.html" class="back-button">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
                Zurück
            </a>

            <div class="leaderboard-header__actions">
            <a href="admin.html" class="home-button" aria-label="Admin" title="Admin">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.604.852.997 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/>
                </svg>
            </a>

            <a href="index.html" class="home-button" aria-label="Home">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 10.5 12 3l9 7.5"/>
                    <path d="M5 9.5V21h14V9.5"/>
                </svg>
            </a>
            </div>
        </div>

        <section class="leaderboard-section">
            <h1 class="leaderboard-title">Rangliste</h1>

            <div class="leaderboard-tabs">
                <button type="button" class="leaderboard-tab leaderboard-tab--active" data-period="today">
                    Heute
                </button>

                <button type="button" class="leaderboard-tab" data-period="alltime">
                    Allzeit
                </button>
            </div>

            <div class="leaderboard-list" aria-live="polite">
                <p class="leaderboard-empty">Laden…</p>
            </div>
        </section>

    </div>

    <script src="js/leaderboard.js"></script>
</body>
</html>
