<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Challenge – Anmelden</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-container">
        <div class="header">
            <div class="badge">Admin</div>
            <h1>Anmelden</h1>
            <p>Melde dich an, um Highscores zu verwalten.</p>
        </div>

        <div class="info-card auth-form">
            <form id="loginForm">
                <div class="form-field">
                    <label for="email">E-Mail</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-field">
                    <label for="password">Passwort</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;">Anmelden</button>
            </form>
        </div>

        <p class="auth-footer">Noch kein Konto? <a href="register.html">Registrieren</a></p>

        <div class="button-group auth-actions">
            <a href="leaderboard.html" class="btn-secondary">Zur Rangliste</a>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
