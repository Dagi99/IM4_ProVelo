<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Challenge – Admin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main-container">
        <div class="header">
            <div class="badge">Admin</div>
            <h1>Willkommen</h1>
            <p>Du bist angemeldet.</p>
        </div>

        <div id="protectedContent" class="info-card">
            <div class="info-row">
                <div class="label">E-Mail</div>
                <div class="value" id="userEmail"></div>
            </div>
            <div class="info-row">
                <div class="label">User ID</div>
                <div class="value" id="userId"></div>
            </div>
        </div>

        <div class="button-group">
            <a href="admin.html" class="btn-secondary">Highscores verwalten</a>
            <button type="button" id="logoutBtn" class="btn-primary">Logout</button>
        </div>
    </div>

    <script src="js/protected.js"></script>
    <script src="js/logout.js"></script>
</body>
</html>
